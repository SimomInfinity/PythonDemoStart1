<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 300px;
            height: 100px;
            background-color: aqua;
            position: relative;
        }
        .box1::before{
            content: 'youtube';
            width: 100px;
            height: 100px;
            background-color: skyblue;
            line-height: 100px;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
        }
        .box2::after{
            content: 'google';
            width: 100px;
            height: 100px;
            background-color: yellow;
            line-height: 100px;
            text-align: center;
            position: absolute;
            top: 0;
            right: 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box1">
            <a href="https://www.youtube.com/"></a>
        </div>
        <div class="box2">
            <a href="https://www.google.com/?hl=zh_TW" target="_blank"></a>
        </div>
    </div>
</body>
</html>
