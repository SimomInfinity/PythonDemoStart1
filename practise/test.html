<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 300px;
            height: 100px;
            background-color: aqua;
            position: relative;
        }
        .box1::before{
            content: '左邊';
            width: 100px;
            height: 100px;
            background-color: red;
            line-height: 100px;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
        }
        .box2::after{
            content: '右邊';
            width: 100px;
            height: 100px;
            background-color: rebeccapurple;
            line-height: 100px;
            text-align: center;
            position: absolute;
            top: 0;
            right: 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>
</body>
</html>
